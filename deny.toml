[graph]
targets = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",          # notify v6 uses CC0 for some files
    "MPL-2.0",          # option-ext (transitive via directories)
    "CDLA-Permissive-2.0",  # webpki-roots v1
    "Zlib",             # foldhash (transitive via hnsw_rs/hashbrown) — permissive OSI license
]
exceptions = []

[advisories]
# All three advisories below are transitive through hyperpolyglot 0.1.7, which
# ships clap v2.x and serde_yaml 0.8.x. hyperpolyglot has no newer release that
# moves to maintained successors. Risk is confined to our offline, read-only
# language-detection path (no network, no user input reaching these crates).
ignore = [
    # yaml-rust 0.4.5 → hyperpolyglot → serde_yaml 0.8; unmaintained, no upgrade
    { id = "RUSTSEC-2024-0320", reason = "transitive via hyperpolyglot/serde_yaml 0.8; no upstream fix; read-only use" },
    # ansi_term 0.12.1 → hyperpolyglot → clap v2; unmaintained, no upgrade
    { id = "RUSTSEC-2021-0139", reason = "transitive via hyperpolyglot/clap v2; no upstream fix; terminal formatting only" },
    # atty 0.2.14 → hyperpolyglot → clap v2; unmaintained, no upgrade
    { id = "RUSTSEC-2024-0375", reason = "transitive via hyperpolyglot/clap v2; no upstream fix; isatty check only" },
    # bincode 1.3.3 → hnsw_rs (ANN index); UNMAINTAINED (team ceased development after a
    # harassment incident), NOT a vulnerability, no upgrade. Used only by hnsw_rs's index
    # file dump/load, which Indexa never calls (the ANN index is built in-memory only).
    { id = "RUSTSEC-2025-0141", reason = "transitive via hnsw_rs/bincode 1.3.3; unmaintained-not-vuln; dump/load path unused" },
    # paste 1.0.15 → candle-core / candle-transformers (via gemm); proc-macro crate marked
    # unmaintained with no replacement. Used internally by candle for macro expansion; no security impact.
    { id = "RUSTSEC-2024-0436", reason = "transitive via candle-core/gemm/paste; proc-macro only, no security impact" },
    # ttf-parser 0.25.1 → lopdf 0.42 → pdf-extract (PDF text extraction). Author declared the
    # crate unmaintained (no successor pinned by lopdf); NOT a vulnerability, no safe upgrade.
    # Exercised only on the offline, read-only PDF-parsing path.
    { id = "RUSTSEC-2026-0192", reason = "transitive via lopdf/pdf-extract/ttf-parser; unmaintained-not-vuln; no upstream fix; offline PDF parsing only" },
    # quick-xml <0.41 DoS advisories. Our DIRECT XML usage (epub/svg/docx) is patched to 0.41;
    # the only residual vulnerable copy is the transitive one pulled by calamine (xlsx parsing) —
    # calamine's latest release (0.35) still pins quick-xml ^0.39, so no upstream fix is available.
    # Risk is DoS-only (memory/CPU exhaustion) on a single maliciously-crafted LOCAL spreadsheet;
    # Indexa is an offline, read-only indexer with a memory watchdog. Re-evaluate when calamine
    # bumps quick-xml ≥0.41.
    { id = "RUSTSEC-2026-0194", reason = "residual only via calamine→quick-xml ^0.39 (no calamine fix); direct path patched to 0.41; offline local DoS-only" },
    { id = "RUSTSEC-2026-0195", reason = "residual only via calamine→quick-xml ^0.39 (no calamine fix); direct path patched to 0.41; offline local DoS-only" },
]

[bans]
multiple-versions = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
