[graph]
targets = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",          # notify v6 uses CC0 for some files
    "MPL-2.0",          # option-ext (transitive via directories)
    "CDLA-Permissive-2.0",  # webpki-roots v1
]
exceptions = []

[advisories]
ignore = []

[bans]
multiple-versions = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
