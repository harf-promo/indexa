[graph]
targets = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",          # notify v6 uses CC0 for some files
    "MPL-2.0",          # option-ext (transitive via directories)
    "CDLA-Permissive-2.0",  # webpki-roots v1
]
exceptions = []

[advisories]
ignore = [
    # yaml-rust 0.4.5 is unmaintained (RUSTSEC-2024-0320). It's a transitive
    # dep via hyperpolyglot → serde_yaml 0.8; no safe upgrade exists on the
    # hyperpolyglot 0.1.x line. Risk: none — we only use hyperpolyglot for
    # read-only language detection; yaml-rust is not on any network path.
    { id = "RUSTSEC-2024-0320", reason = "transitive via hyperpolyglot/serde_yaml 0.8; no upstream fix; read-only language detection only" },
]

[bans]
multiple-versions = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
