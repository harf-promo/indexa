name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # A tag must have its release notes cut out of [Unreleased] before anything builds —
  # v0.20.x shipped with no CHANGELOG sections because nothing enforced this.
  changelog-gate:
    name: CHANGELOG has this release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Require a CHANGELOG section matching the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -qE "^## \[${VERSION//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${VERSION}]' section for tag ${GITHUB_REF_NAME}. Move the notes out of [Unreleased] before tagging."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: changelog-gate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: indexa-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: indexa-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: indexa-x86_64-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: indexa-aarch64-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: indexa-x86_64-windows.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (native targets)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p indexa

      - name: Build (Linux arm64 cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p indexa

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/indexa ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/indexa.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true

  desktop:
    name: Desktop (macOS universal)
    needs: [build, release]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both Apple targets — the desktop bundle is built as a universal
          # (Intel + Apple-Silicon) binary via --target universal-apple-darwin.
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/indexa-desktop -> target

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Materialize App Store Connect API key (.p8)
        # APPLE_API_KEY_PATH must be a real file on the runner — the .p8 is stored
        # base64-encoded in APPLE_API_KEY_FILE and decoded here. No-ops when the
        # secret is absent (ad-hoc fallback). See docs/signing.md for setup.
        env:
          APPLE_API_KEY_FILE: ${{ secrets.APPLE_API_KEY_FILE }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -n "$APPLE_API_KEY_FILE" ]; then
            mkdir -p "$HOME/private_keys"
            KEY_PATH="$HOME/private_keys/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_KEY_FILE" | openssl base64 -d -A > "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Build + bundle desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signature (for the .sig the in-app updater verifies).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID code signing. tauri-action imports the cert into a temp
          # keychain when APPLE_CERTIFICATE is set; with these empty it falls back to
          # ad-hoc signing (so the build still succeeds before the secrets are added).
          # See docs/signing.md for how to populate them.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization — App Store Connect API-key method (active).
          # APPLE_API_KEY_PATH is written to $GITHUB_ENV by the step above.
          #
          # APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID are deliberately NOT passed here.
          # tauri-bundler probes the Apple-ID auth triple *first* with var_os(), which
          # treats an empty string as "present". Passing them as `${{ secrets.X }}` (which
          # expand to "" when the secret is unset) hijacks notarization into the Apple-ID
          # path and dies with "Team ID must be at least 3 characters" — never reaching the
          # API-key method. Omitting them lets the bundler fall through to the API key below.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          projectPath: apps/indexa-desktop
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          # Universal binary: one .dmg/.app.tar.gz that runs on Intel and Apple
          # Silicon. Published under the darwin-universal updater key (see main.rs).
          args: --target universal-apple-darwin

      - name: Notarization diagnostics (on failure)
        # If the build/notarize step fails or hangs, dump recent notarytool submissions so the
        # failure is self-diagnosing. A long "In Progress" with a "log not yet available" log means
        # the team isn't provisioned for the Notary service yet (first-time notarizer) — contact
        # Apple Developer Programs Support; see docs/signing.md. No-ops without an API key.
        if: failure()
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -z "${APPLE_API_KEY_PATH:-}" ] || [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
            echo "No App Store Connect API key configured — skipping notarization diagnostics."
            exit 0
          fi
          echo "Recent notarytool submissions (a long 'In Progress' + a 'log not yet available'"
          echo "log means the team isn't provisioned for the Notary service — contact Apple"
          echo "Developer Programs Support; see docs/signing.md):"
          xcrun notarytool history \
            --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" || true

  desktop-linux:
    # First-ever Linux desktop build. continue-on-error keeps the whole job advisory:
    # a Tauri/Linux bundling failure must NOT be able to block or red-X the CLI release
    # (the five CLI binaries above are the product; this is an experiment until it has
    # shipped green a few times). Promote to blocking by deleting continue-on-error.
    name: Desktop (Linux x86_64) (experimental)
    needs: [build, release]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri v2 Linux dependencies
        # The documented Tauri v2 Ubuntu prerequisite list, plus:
        #   - libayatana-appindicator3-dev — NOT libappindicator3-dev: Ubuntu ≥22.04 only
        #     ships the ayatana fork, and the desktop app enables tauri's "tray-icon".
        #   - patchelf + file — required by linuxdeploy for AppImage bundling.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            patchelf \
            curl \
            wget \
            file

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/indexa-desktop -> target

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build + bundle desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tauri.conf.json sets createUpdaterArtifacts: true, so the bundler insists on
          # signing updater artifacts — the key is required even though Linux has no
          # updater wiring yet (see includeUpdaterJson below).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/indexa-desktop
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          # No updater wiring for Linux yet: latest.json is produced by the macOS job and
          # is darwin-keyed (main.rs resolves the per-arch darwin updater targets). Writing
          # it from here too would race the macOS job over the same release asset — so this
          # job must not touch it. AppImage users re-download new releases by hand.
          includeUpdaterJson: false
          # Per-platform bundle selection at the CLI instead of forking tauri.conf.json
          # (whose `targets: "all"` would also attempt rpm). First run sticks to the two
          # documented Linux targets: .AppImage (portable) + .deb (Debian/Ubuntu).
          args: --bundles deb,appimage
