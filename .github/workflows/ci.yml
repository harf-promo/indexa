name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Tests
        run: cargo test --all

  # Headless-Chrome smoke test of the served web UI. The JS bundle is
  # compile-time-concatenated, so only executing the page in a real browser
  # catches runtime ReferenceErrors that fmt/clippy/test cannot. Additive job —
  # NOT in the branch-protection required-checks list.
  web-smoke:
    name: web smoke (headless Chrome)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build indexa (debug)
        run: cargo build -p indexa

      # ubuntu-latest runner images ship Google Chrome preinstalled at
      # /usr/bin/google-chrome — no setup action needed. Node >= 22 (global
      # fetch + WebSocket) is also preinstalled.
      - name: Run web smoke test
        env:
          INDEXA_BIN: ./target/debug/indexa
          CHROME_BIN: /usr/bin/google-chrome
          PORT: "7787"
        run: node scripts/web-smoke.mjs

  # Retrieval-quality gate: index this very repo with `deep --no-embed` (FTS-only, so no
  # embedder / no Ollama / no models pulled — fully hermetic) and score the EXACT
  # production `retrieve()` ranking against a committed golden set via `indexa eval`.
  # Catches regressions in chunking / parsing / tokenization / ranking that fmt/clippy/
  # test cannot see. Golden probes are distinctive identifiers scored in sparse (BM25)
  # mode; the floor is set well below the measured 1.00 hit rate to tolerate cross-run
  # tie-order drift. Additive job — NOT in the branch-protection required-checks list.
  eval:
    name: retrieval eval (self-golden, hermetic)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build indexa (debug)
        run: cargo build -p indexa

      - name: Index this repo (FTS only — no embeddings, no Ollama)
        run: |
          ./target/debug/indexa scan .
          ./target/debug/indexa deep . --no-embed

      - name: Score retrieval against the self-golden set
        run: |
          ./target/debug/indexa eval fixtures/self-golden.json \
            --mode sparse --top-k 10 --min-hit-rate 0.80

  # The Tauri desktop app is excluded from `cargo --workspace` (its webkit deps
  # aren't present on the Linux/Windows CI runners), so until now a `main.rs` break
  # only surfaced at release. This compiles it on every PR — a native arm64 build,
  # no bundling/signing (that stays in release.yml). RUSTFLAGS is cleared so a
  # warning in a third-party tauri dependency can't fail the build; we only want to
  # catch our own compile errors here. Additive — NOT in branch-protection.
  desktop-build:
    name: desktop build (macOS)
    runs-on: macos-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/indexa-desktop -> target

      - name: Build desktop app
        # --locked: build from the committed apps/indexa-desktop/Cargo.lock and fail if it's
        # stale, so the desktop dep graph can't silently float into a broken upstream release.
        run: cargo build --locked --manifest-path apps/indexa-desktop/Cargo.toml
