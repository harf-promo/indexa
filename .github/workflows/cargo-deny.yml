name: Cargo Deny

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deny-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deny:
    name: License and advisory check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
