name: DCO

on:
  pull_request:
    branches: [main]

concurrency:
  group: dco-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        run: |
          failed=0
          while IFS= read -r line; do
            sha=$(echo "$line" | awk '{print $1}')
            msg=$(git log -1 --format="%B" "$sha")
            if ! echo "$msg" | grep -qE '^Signed-off-by: .+ <.+>'; then
              echo "FAIL: commit $sha is missing Signed-off-by trailer"
              echo "  Subject: $(git log -1 --format='%s' $sha)"
              failed=1
            fi
          done < <(git log --no-merges --format="%H" "origin/main..HEAD")
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "All commits in this PR must have a Signed-off-by trailer."
            echo "Use 'git commit -s' or 'git rebase --signoff origin/main' to add."
            exit 1
          fi
          echo "DCO sign-off OK."
