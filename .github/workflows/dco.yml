name: DCO

on:
  pull_request:
    branches: [main]

concurrency:
  group: dco-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        uses: tim-actions/dco@v1.1.0
