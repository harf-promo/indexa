name: Docs

# Offline-only link check: validates relative file links and anchors across all
# Markdown (the drift class that actually bites — renamed/moved docs), without
# the flakiness or rate limits of fetching external URLs. Path-filtered so it
# only runs on docs PRs (skips CI churn when no Markdown changed).
on:
  pull_request:
    paths:
      - "**/*.md"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Markdown link check (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --no-progress "**/*.md"
          fail: true
