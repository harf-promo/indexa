<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Indexa writes a summary for every file, composes those into a summary for every folder, and rolls them up the directory tree into one whole-project synthesis. Every node — file and folder — is queryable at three tiers: L0 a one-line abstract, L1 a full summary, L2 the raw content.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- upward connectors: files -> folders -> root (drawn first, under the cards) -->
  <g stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow)" opacity="0.85">
    <!-- query files -> query folder -->
    <path d="M165,470 C165,420 230,420 230,360"/>
    <path d="M300,470 C300,420 250,420 250,360"/>
    <!-- core file -> core folder -->
    <path d="M640,470 L640,360"/>
    <!-- docs file -> docs folder -->
    <path d="M1055,470 L1055,360"/>
    <!-- folders -> root -->
    <path d="M240,300 C240,230 560,230 600,180"/>
    <path d="M640,300 L640,180"/>
    <path d="M1050,300 C1050,230 720,230 680,180"/>
  </g>

  <text x="640" y="232" text-anchor="middle" font-size="15" font-style="italic" fill="#2563eb" font-weight="600">composed bottom-up — folder into parent, up and up</text>

  <!-- ROOT (whole-project synthesis) -->
  <g>
    <rect x="440" y="96" width="400" height="84" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2.5"/>
    <rect x="440" y="96" width="6" height="84" rx="3" fill="#7c3aed"/>
    <text x="466" y="128" font-size="19" font-weight="700" fill="#1e1b4b">📁 my-repo · whole-project synthesis</text>
    <text x="466" y="153" font-size="14" fill="#4338ca">L0 “Rust workspace: a local context engine…”</text>
    <text x="466" y="172" font-size="14" fill="#6d28d9">L1 full project summary  ·  L2 raw content</text>
  </g>

  <!-- FOLDER ROW -->
  <g font-size="13">
    <!-- crates/query -->
    <rect x="110" y="300" width="280" height="60" rx="11" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="110" y="300" width="6" height="60" rx="3" fill="#2563eb"/>
    <text x="134" y="326" font-size="16" font-weight="700" fill="#0f172a">📁 crates/query</text>
    <text x="134" y="348" fill="#1d4ed8">L0 one-liner · L1 folder summary</text>

    <!-- crates/core -->
    <rect x="500" y="300" width="280" height="60" rx="11" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="500" y="300" width="6" height="60" rx="3" fill="#2563eb"/>
    <text x="524" y="326" font-size="16" font-weight="700" fill="#0f172a">📁 crates/core</text>
    <text x="524" y="348" fill="#1d4ed8">L0 one-liner · L1 folder summary</text>

    <!-- docs -->
    <rect x="910" y="300" width="280" height="60" rx="11" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
    <rect x="910" y="300" width="6" height="60" rx="3" fill="#2563eb"/>
    <text x="934" y="326" font-size="16" font-weight="700" fill="#0f172a">📁 docs</text>
    <text x="934" y="348" fill="#1d4ed8">L0 one-liner · L1 folder summary</text>
  </g>

  <!-- FILE ROW (Phase 1: every file summarized first) -->
  <g font-size="12.5">
    <!-- qa.rs -->
    <rect x="70" y="470" width="190" height="92" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
    <text x="90" y="498" font-size="15" font-weight="700" fill="#0f172a">📄 qa.rs</text>
    <g font-size="11.5" font-weight="700">
      <rect x="90" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="98" y="524" fill="#0e7490">L0</text>
      <rect x="130" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="138" y="524" fill="#0e7490">L1</text>
      <rect x="170" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="178" y="524" fill="#0e7490">L2</text>
    </g>
    <text x="90" y="550" font-size="11.5" fill="#64748b">abstract · summary · raw</text>

    <!-- summarize.rs -->
    <rect x="285" y="470" width="190" height="92" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
    <text x="305" y="498" font-size="15" font-weight="700" fill="#0f172a">📄 summarize.rs</text>
    <g font-size="11.5" font-weight="700">
      <rect x="305" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="313" y="524" fill="#0e7490">L0</text>
      <rect x="345" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="353" y="524" fill="#0e7490">L1</text>
      <rect x="385" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="393" y="524" fill="#0e7490">L2</text>
    </g>
    <text x="305" y="550" font-size="11.5" fill="#64748b">abstract · summary · raw</text>

    <!-- store.rs -->
    <rect x="545" y="470" width="190" height="92" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
    <text x="565" y="498" font-size="15" font-weight="700" fill="#0f172a">📄 store.rs</text>
    <g font-size="11.5" font-weight="700">
      <rect x="565" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="573" y="524" fill="#0e7490">L0</text>
      <rect x="605" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="613" y="524" fill="#0e7490">L1</text>
      <rect x="645" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="653" y="524" fill="#0e7490">L2</text>
    </g>
    <text x="565" y="550" font-size="11.5" fill="#64748b">abstract · summary · raw</text>

    <!-- USAGE.md -->
    <rect x="960" y="470" width="190" height="92" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
    <text x="980" y="498" font-size="15" font-weight="700" fill="#0f172a">📄 USAGE.md</text>
    <g font-size="11.5" font-weight="700">
      <rect x="980" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="988" y="524" fill="#0e7490">L0</text>
      <rect x="1020" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="1028" y="524" fill="#0e7490">L1</text>
      <rect x="1060" y="510" width="34" height="20" rx="5" fill="#ecfeff" stroke="#0891b2"/><text x="1068" y="524" fill="#0e7490">L2</text>
    </g>
    <text x="980" y="550" font-size="11.5" fill="#64748b">abstract · summary · raw</text>
  </g>

  <!-- captions -->
  <text x="70" y="446" font-size="14" font-weight="600" fill="#0e7490">Phase 1 — every file gets a summary</text>
  <text x="640" y="606" text-anchor="middle" font-size="14" fill="#475569">Every node is independently queryable: scan cheaply at L0, drill to L1, read raw at L2.</text>
  <text x="640" y="628" text-anchor="middle" font-size="13" fill="#94a3b8">Indexa — the local context engine for AI · the index is the substrate, context is the product</text>
</svg>
